---
# tasks file for nginx-role
- name: Install package
  apt: name="{{ pkg }}" state=present

- name: start service
  service: name="{{ svc }}" state=started

- name: create file
  ansible.builtin.file: path="{{ file_path }}" state=touch

- name: copy content of file
  copy:
    dest: "{{ file_path }}"
    content:
       <h1> welcome to roles demo </h1>

  notify: Restart nginx
